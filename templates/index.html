<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pi Fleet | Premium Node Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #09090e;
            --primary: #f97316;
            --primary-glow: rgba(249, 115, 22, 0.4);
            --secondary: #8b5cf6;
            --secondary-glow: rgba(139, 92, 246, 0.4);
            --glass-bg: rgba(20, 20, 25, 0.65);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text: #f8fafc;
            --text-muted: #94a3b8;
        }
        body {
            margin: 0; font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text);
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(249, 115, 22, 0.08), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(139, 92, 246, 0.08), transparent 25%);
            background-attachment: fixed;
            overflow-x: hidden;
        }
        /* Glassmorphism */
        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }
        
        .header {
            padding: 20px 40px; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--glass-border);
            background: rgba(10, 10, 15, 0.8); backdrop-filter: blur(20px);
            position: sticky; top: 0; z-index: 100;
        }
        .header-title h1 {
            margin: 0; color: #fff; font-size: 26px; font-weight: 800;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            display: inline-block;
        }
        
        .btn {
            background: rgba(255,255,255,0.05); color: #fff; border: 1px solid var(--glass-border);
            padding: 10px 20px; border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.3s;
            font-family: 'Outfit', sans-serif;
        }
        .btn:hover { background: rgba(255,255,255,0.1); transform: translateY(-2px); }
        .btn-primary {
            background: linear-gradient(135deg, var(--primary), #d97706);
            border: none; box-shadow: 0 4px 15px var(--primary-glow);
        }
        .btn-primary:hover { box-shadow: 0 6px 20px var(--primary-glow); }
        
        .container { max-width: 1400px; margin: 40px auto; padding: 0 20px; }
        
        /* System Monitor */
        .sys-monitor { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 40px; }
        .sys-card {
            padding: 20px; display: flex; align-items: center; gap: 20px; position: relative; overflow: hidden;
        }
        .sys-card::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.03) 0%, transparent 60%);
            opacity: 0; transition: opacity 0.5s;
        }
        .sys-card:hover::before { opacity: 1; }
        .sys-icon {
            font-size: 32px; background: rgba(255,255,255,0.05); width: 60px; height: 60px;
            display: flex; align-items: center; justify-content: center; border-radius: 12px;
            border: 1px solid var(--glass-border);
        }
        .sys-info h4 { margin: 0; font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
        .sys-info span { font-size: 22px; font-weight: 800; }
        .sys-info .sub-val { font-size: 13px; color: var(--primary); font-weight: 600; display: block; margin-top: 4px; }
        
        /* Nodes Grid */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 30px; }
        .card { display: flex; flex-direction: column; overflow: hidden; position: relative; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 15px 40px rgba(0,0,0,0.4); border-color: rgba(255,255,255,0.15); }
        
        .card-header {
            padding: 20px 25px; border-bottom: 1px solid var(--glass-border);
            display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.2);
        }
        .card-header h3 { margin: 0; font-size: 20px; font-weight: 800; display: flex; align-items: center; gap: 10px; }
        
        .status-dot {
            width: 10px; height: 10px; border-radius: 50%; display: inline-block;
            box-shadow: 0 0 10px currentColor;
        }
        .status-up .status-dot { background: #10b981; color: #10b981; animation: pulse 2s infinite; }
        .status-down .status-dot { background: #ef4444; color: #ef4444; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(16,185,129,0.4); } 70% { box-shadow: 0 0 0 10px rgba(16,185,129,0); } 100% { box-shadow: 0 0 0 0 rgba(16,185,129,0); } }
        
        .card-body { padding: 25px; flex: 1; }
        .stat-row { display: flex; justify-content: space-between; margin-bottom: 15px; font-size: 14px; align-items: center;}
        .stat-label { color: var(--text-muted); }
        .stat-value { font-weight: 600; font-family: monospace; font-size: 15px; }
        
        .card-footer {
            padding: 20px 25px; border-top: 1px solid var(--glass-border);
            background: rgba(0,0,0,0.2); display: flex; gap: 10px; flex-wrap: wrap;
        }
        .btn-sm {
            flex: 1; padding: 10px; font-size: 13px; background: rgba(255,255,255,0.05); color: #fff;
            border: 1px solid var(--glass-border); border-radius: 8px; cursor: pointer; transition: 0.2s; font-weight: 600;
        }
        .btn-sm:hover { background: rgba(255,255,255,0.1); }
        
        /* Modal Styles */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: var(--bg); width: 100%; max-width: 500px; padding: 30px; }
        .form-group input, .form-group textarea { width: 100%; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); border-radius: 8px; color: #fff; box-sizing: border-box; font-family: 'Outfit'; font-size: 14px; margin-top: 8px;}
        .form-group textarea { height: 120px; font-family: monospace; }
        
        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
    </style>
</head>
<body>

    <div class="header glass" style="border-radius: 0; border-top: none; border-left: none; border-right: none;">
        <div class="header-title">
            <h1>Pi Fleet 🚀</h1>
            <span style="font-size: 13px; color: var(--text-muted); margin-left: 20px; padding: 6px 12px; background: rgba(255,255,255,0.05); border-radius: 20px; border: 1px solid var(--glass-border);">
                Dış IP: <span id="publicIpTxt" style="color: #fff; font-family: monospace; font-weight:bold;">-</span>
            </span>
        </div>
        <div>
            <button class="btn" onclick="openCreateModal()">+ Yeni Node Ekle</button>
        </div>
    </div>

    <div class="container">
        <!-- System Monitor -->
        <div class="sys-monitor">
            <div class="sys-card glass">
                <div class="sys-icon">⚡</div>
                <div class="sys-info"><h4>CPU KULLANIMI</h4><span id="sysCpu">-</span></div>
            </div>
            <div class="sys-card glass">
                <div class="sys-icon">🧠</div>
                <div class="sys-info"><h4>RAM KULLANIMI</h4><span id="sysRam">-</span><span class="sub-val" id="sysRamSub"></span></div>
            </div>
            <div class="sys-card glass">
                <div class="sys-icon">💾</div>
                <div class="sys-info"><h4>DİSK & I/O</h4><span id="sysDisk">-</span><span class="sub-val" id="sysDiskIo">I/O: -</span></div>
            </div>
            <div class="sys-card glass">
                <div class="sys-icon">🔥</div>
                <div class="sys-info"><h4>SICAKLIK</h4><span id="sysTemp">-</span></div>
            </div>
        </div>

        <div class="grid" id="nodesGrid">
            <div style="color:var(--text-muted)">Node verileri yükleniyor...</div>
        </div>
    </div>

    <!-- Modals (Create, UUID, Rename) -->
    <!-- CREATE MODAL -->
    <div class="modal" id="createModal">
        <div class="modal-content glass">
            <div style="display:flex; justify-content:space-between; margin-bottom: 20px;">
                <h2 style="margin:0; color:var(--primary);">Yeni Node Oluştur</h2>
                <span style="cursor:pointer; font-size:24px;" onclick="closeModal('createModal')">&times;</span>
            </div>
            <div class="form-group" style="margin-bottom: 20px;">
                <label style="color:var(--text-muted); font-size:14px;">Node İsmi</label>
                <input type="text" id="newNodeName" placeholder="Örn: Yeni Node">
            </div>
            <button class="btn btn-primary" onclick="createNode()" style="width:100%">Oluştur ve Başlat</button>
        </div>
    </div>
    
    <!-- UUID MODAL -->
    <div class="modal" id="uuidModal">
        <div class="modal-content glass">
            <div style="display:flex; justify-content:space-between; margin-bottom: 10px;">
                <h2 style="margin:0; color:var(--primary);">UUID Kimlik Ayarı</h2>
                <span style="cursor:pointer; font-size:24px;" onclick="closeModal('uuidModal')">&times;</span>
            </div>
            <p style="font-size:13px; color:var(--text-muted); margin-bottom:15px;">Bu Node için kayıtlı olan kimlik dosyası içeriği:</p>
            <div class="form-group" style="margin-bottom: 20px;">
                <textarea id="uuidContent" placeholder="Kimlik içeriği buraya..."></textarea>
            </div>
            <input type="hidden" id="activeNodeId">
            <button class="btn btn-primary" onclick="saveUUID()" style="width:100%">Değişiklikleri Kaydet</button>
        </div>
    </div>

    <!-- RENAME MODAL -->
    <div class="modal" id="renameModal">
        <div class="modal-content glass">
            <div style="display:flex; justify-content:space-between; margin-bottom: 20px;">
                <h2 style="margin:0; color:var(--primary);">Node İsmini Düzenle</h2>
                <span style="cursor:pointer; font-size:24px;" onclick="closeModal('renameModal')">&times;</span>
            </div>
            <div class="form-group" style="margin-bottom: 20px;">
                <label style="color:var(--text-muted); font-size:14px;">Yeni İsim</label>
                <input type="text" id="renameNodeName" placeholder="Yeni İsim">
            </div>
            <input type="hidden" id="renameNodeId">
            <button class="btn btn-primary" onclick="saveRename()" style="width:100%">Güncelle</button>
        </div>
    </div>

    <script>
        async function loadSystem() {
            try {
                const res = await fetch('/api/system');
                const data = await res.json();
                document.getElementById('sysCpu').textContent = data.cpu;
                document.getElementById('sysRam').textContent = data.ram_percent;
                document.getElementById('sysRamSub').textContent = `${data.ram_used} / ${data.ram_total}`;
                document.getElementById('sysDisk').textContent = data.disk_percent;
                document.getElementById('sysDiskIo').textContent = `Kullanım: ${data.disk_used} / ${data.disk_total} | Meşguliyet: ${data.disk_busy || '0%'}`;
                document.getElementById('sysTemp').textContent = data.temp;
                document.getElementById('publicIpTxt').textContent = data.public_ip || '-';
            } catch(e) { console.error("System load error:", e); }
        }

        async function loadNodes() {
            try {
                const res = await fetch('/api/nodes');
                const nodes = await res.json();
                
                const grid = document.getElementById('nodesGrid');
                grid.innerHTML = '';
                
                if(nodes.length === 0) {
                    grid.innerHTML = '<div style="color:var(--text-muted); grid-column: 1 / -1; text-align:center; padding: 40px;">Henüz hiç Node oluşturulmamış.</div>';
                    return;
                }
                
                nodes.forEach(node => {
                    const isUp = node.status.includes('Up');
                    const statusClass = isUp ? 'status-up' : 'status-down';
                    
                    const card = `
                        <div class="card glass">
                            <div class="card-header ${statusClass}">
                                <h3><span class="status-dot"></span> ${node.name} <span style="font-size:14px; cursor:pointer; color:var(--text-muted);" onclick="openRenameModal('${node.id}', '${node.name}')">✏️</span></h3>
                                <div style="font-size:12px; color:var(--text-muted); font-family:monospace;">${isUp ? node.status.replace('Up ', 'Aktif: ') : 'DURDURULDU'}</div>
                            </div>
                            <div class="card-body">
                                <div class="stat-row">
                                    <span class="stat-label">Port Bloğu:</span>
                                    <span class="stat-value">${node.port_prefix}1 - ${node.port_prefix}3</span>
                                </div>
                                <div class="stat-row">
                                    <span class="stat-label">Erişilebilirlik (Availability):</span>
                                    <span class="stat-value" style="color:var(--primary)">${node.availability || 'Hesaplanıyor...'}</span>
                                </div>
                                <div class="stat-row">
                                    <span class="stat-label">Senkronizasyon (Ledger):</span>
                                    <span class="stat-value" style="color:var(--secondary)">${node.sync_status}</span>
                                </div>
                                <div class="stat-row" style="margin-bottom: 5px;">
                                    <span class="stat-label">Node Durumu (State):</span>
                                    <div style="text-align: right">
                                        <span class="stat-value" style="color:#10b981">${node.state}</span>
                                    </div>
                                </div>
                                ${node.detail ? `<div style="font-size:11px; color:var(--text-muted); margin-bottom:15px; text-align:right; font-style:italic;">${node.detail}</div>` : '<div style="margin-bottom:15px;"></div>'}
                                <div class="stat-row">
                                    <span class="stat-label">Gelen/Giden Bağlantı:</span>
                                    <span class="stat-value">${node.incoming} / 8</span>
                                </div>
                                <div class="stat-row">
                                    <span class="stat-label">Kimlik (UUID):</span>
                                    <span class="stat-value" style="font-size:12px; max-width: 150px; text-overflow: ellipsis; overflow: hidden; white-space: nowrap;">
                                        ${node.uuid ? '✅ Yüklü' : '❌ Tanımsız'}
                                    </span>
                                </div>
                            </div>
                            <div class="card-footer">
                                ${isUp 
                                    ? `<button class="btn-sm" onclick="nodeAction('${node.id}', 'restart')">Restart</button>
                                       <button class="btn-sm" onclick="nodeAction('${node.id}', 'stop')" style="border-color: rgba(239,68,68,0.3); color: #ef4444;">Durdur</button>`
                                    : `<button class="btn-sm" onclick="nodeAction('${node.id}', 'start')" style="border-color: rgba(16,185,129,0.3); color: #10b981;">Başlat</button>`
                                }
                                <button class="btn-sm" onclick="openUuidModal('${node.id}')" style="border-color: rgba(249,115,22,0.3); color: var(--primary);">UUID</button>
                                <button class="btn-sm" onclick="if(confirm('Veritabanı sıfırlanacak. Emin misiniz?')) nodeAction('${node.id}', 'wipe_db')" style="border-color: rgba(139,92,246,0.3); color: var(--secondary);">Sıfırla</button>
                            </div>
                        </div>
                    `;
                    grid.innerHTML += card;
                });
            } catch (e) { console.error(e); }
        }

        function openCreateModal() { document.getElementById('createModal').style.display = 'flex'; }
        
        async function openUuidModal(id) { 
            document.getElementById('activeNodeId').value = id;
            const contentArea = document.getElementById('uuidContent');
            contentArea.value = 'Yükleniyor...';
            document.getElementById('uuidModal').style.display = 'flex'; 
            try {
                const res = await fetch(`/api/nodes/${id}/uuid`);
                const data = await res.json();
                contentArea.value = data.content || '';
            } catch(e) { contentArea.value = ''; }
        }

        function openRenameModal(id, currentName) {
            document.getElementById('renameNodeId').value = id;
            document.getElementById('renameNodeName').value = currentName;
            document.getElementById('renameModal').style.display = 'flex';
        }

        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        async function createNode() {
            const name = document.getElementById('newNodeName').value || 'Yeni Node';
            try {
                await fetch('/api/nodes/create', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({name: name})
                });
                closeModal('createModal');
                document.getElementById('newNodeName').value = '';
                loadNodes();
            } catch (e) { alert('Hata: ' + e); }
        }

        async function nodeAction(id, action) {
            try {
                await fetch(`/api/nodes/${id}/action`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({action: action})
                });
                loadNodes();
            } catch (e) { alert('Hata: ' + e); }
        }

        async function saveUUID() {
            const id = document.getElementById('activeNodeId').value;
            const content = document.getElementById('uuidContent').value;
            try {
                await fetch(`/api/nodes/${id}/uuid`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({content: content})
                });
                closeModal('uuidModal');
                loadNodes();
            } catch (e) { alert('Hata: ' + e); }
        }

        async function saveRename() {
            const id = document.getElementById('renameNodeId').value;
            const name = document.getElementById('renameNodeName').value;
            try {
                await fetch(`/api/nodes/${id}/rename`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({name: name})
                });
                closeModal('renameModal');
                loadNodes();
            } catch (e) { alert('Hata: ' + e); }
        }

        loadSystem();
        loadNodes();
        setInterval(() => { loadSystem(); loadNodes(); }, 5000);
    </script>
</body>
</html>
